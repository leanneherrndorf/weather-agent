name: Daily Weather Report

on:
  schedule:
    # Runs at 07:00 UTC every day
    - cron: "0 7 * * *"

  # Allows manual trigger from the Actions tab — for testing only
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in test mode"
        required: false
        default: "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Python: run the agent ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Audit Python dependencies
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt

      - name: Run weather agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SCHEDULED_RUN: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m agent.main --test
          else
            python -m agent.main
          fi

      # --- Node: build the React site ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      # --- Deploy to GitHub Pages ---
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
